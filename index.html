<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>USW Network | Secure Node</title>
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-area">
        <span class="logo">USW Network</span>
        <select id="language-select" onchange="changeLanguage()">
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
        </select>
    </div>
    <div class="nav-buttons">
        <button class="btn-run" onclick="runCode()">Run Script</button>
        <button class="btn-deploy" onclick="deployToGithub()">Deploy Repo</button>
    </div>
</header>

<main id="main-container">
    <div id="editor-root" style="height: 100%; width: 100%;"></div>
    <div id="console-container">
        <div class="console-header">System Output</div>
        <div id="console">Loading Secure Environment...</div>
    </div>
</main>

<footer>
    <span id="engine-status">Engine: Initializing...</span>
</footer>

<script src="config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
<script src="script.js"></script>
</body>
</html>
