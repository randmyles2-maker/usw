<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USW // AETHER</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="aether-nav">
    <div class="brand" onclick="location.reload()">USW NETWORK</div>
    <div id="runtime-controls" class="hidden">
        <button class="action-btn run" onclick="runCode()">Run</button>
        <button class="action-btn deploy" onclick="deployToGithub()">Deploy</button>
        <button class="close-icon" onclick="location.reload()">✕</button>
    </div>
</header>

<main id="dashboard" class="view">
    <section class="hero-section">
        <h1>Environments</h1>
        <p>Select a specialized node to begin.</p>
    </section>

    <div class="aether-grid">
        <div class="node" onclick="launchIDE('python')">
            <span class="type">AI / DATA</span>
            <h3>Python Core</h3>
            <div class="status-dot"></div>
        </div>
        <div class="node" onclick="launchIDE('javascript')">
            <span class="type">WEB / LOGIC</span>
            <h3>JavaScript</h3>
            <div class="status-dot"></div>
        </div>
        <div class="node" onclick="launchIDE('cpp')">
            <span class="type">SYSTEM / WASM</span>
            <h3>C++ Engine</h3>
            <div class="status-dot"></div>
        </div>
        <div class="node" onclick="launchIDE('sql')">
            <span class="type">STORAGE</span>
            <h3>SQL Query</h3>
            <div class="status-dot"></div>
        </div>
    </div>
</main>

<div id="editor-stage" class="view hidden">
    <div id="monaco-canvas"></div>
    <div class="aether-console">
        <div id="output-stream">System Ready...</div>
    </div>
</div>

<script src="config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
<script src="script.js"></script>
</body>
</html>
