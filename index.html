<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>USW // AETHER</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h1>AETHER ACCESS</h1>
        <input type="text" id="username" placeholder="IDENTITY">
        <input type="password" id="password" placeholder="PASSWORD">
        <div class="auth-buttons">
            <button onclick="handleAuth('login')">LOGIN</button>
            <button onclick="handleAuth('signup')" class="secondary">SIGN UP</button>
        </div>
        <p id="auth-msg"></p>
    </div>
</div>

<header class="aether-nav">
    <div class="nav-left">
        <div class="brand">USW NETWORK</div>
        <div id="output-stream" class="terminal-mini">Ready.</div>
    </div>
    <div id="runtime-controls" class="hidden">
        <button class="action-btn" onclick="runCode()">Run</button>
        <button class="action-btn" onclick="deployToGithub()">Deploy</button>
        <button class="close-icon" onclick="backToMenu()">✕</button>
    </div>
</header>

<main id="dashboard" class="view">
    <aside class="sidebar">
        <div class="sidebar-label">ARCHIVED_NODES</div>
        <div id="saved-files-list"></div>
    </aside>
    <div class="list-container">
        <div class="list-header">NEW_ENVIRONMENTS</div>
        <div class="list-item" onclick="launchIDE('html', true)">
            <span class="title">HTML / CSS</span>
        </div>
        <div class="list-item" onclick="launchIDE('javascript', true)">
            <span class="title">JavaScript</span>
        </div>
        <div class="list-item" onclick="launchIDE('python', true)">
            <span class="title">Python 3</span>
        </div>
    </div>
</main>

<div id="editor-stage" class="view hidden">
    <div id="monaco-canvas"></div>
</div>

<script src="storage.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
<script src="script.js"></script>
</body>
</html>
