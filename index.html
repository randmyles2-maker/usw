<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> <title>USW Network | Secure Desktop IDE</title>
    
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-area">
        <span class="logo">USW Network</span>
        <select id="language-select" onchange="changeLanguage()">
            <option value="python">Python 3.11</option>
            <option value="javascript">JavaScript</option>
            <option value="cpp">C++ (WASM)</option>
        </select>
    </div>
    <div class="nav-buttons">
        <button class="btn-run" onclick="runCode()">▶ Run Script</button>
        <button class="btn-deploy" onclick="deployToGithub()">🚀 Deploy Repo</button>
    </div>
</header>

<main id="main-container">
    <div id="editor-root"></div>
    <div id="console-container">
        <div class="console-header">Isolated Output Console</div>
        <div id="console">Initializing USW Virtual Environment...</div>
    </div>
</main>

<footer>
    <div id="session-info">Session: Secure | Mode: Desktop Only</div>
    <div id="engine-status">Engine: Connecting...</div>
</footer>

<script src="config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
<script src="script.js"></script>
</body>
</html>
